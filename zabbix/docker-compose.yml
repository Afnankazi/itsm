# ============================================================
#  EXP NO. 5 — Monitoring IT Infrastructure Using Zabbix
#  Docker Compose Stack: MySQL + Zabbix Server + Web + Agent2
# ============================================================
# FIXES vs. original manual docker run commands:
#   1. Added ZBX_SERVER_HOST to web container (was missing)
#   2. Agent now uses service name "zabbix-server" not 127.0.0.1
#   3. MySQL has required utf8mb4 charset + collation flags
#   4. Added depends_on so containers start in correct order
#   5. Added named volumes so data survives restarts
#   6. Added restart: unless-stopped on all services
#   7. Upgraded to zabbix-agent2 (Go-based, recommended over v1)
# ============================================================

services:

  # ─────────────────────────────────────────────
  # 1. MySQL Database
  # ─────────────────────────────────────────────
  zabbix-mysql:
    image: mysql:8.0
    container_name: zabbix-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbixpass
    # Required by Zabbix 6.0+: utf8mb4 charset + native auth plugin
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - zabbix-mysql-data:/var/lib/mysql
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=rootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # 2. Zabbix Server
  # ─────────────────────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-latest
    container_name: zabbix-server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: zabbix-mysql       # <-- service name, not an IP
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbixpass
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "10051:10051"                    # Zabbix trapper port
    volumes:
      - zabbix-server-data:/var/lib/zabbix
    networks:
      - zabbix-net
    depends_on:
      zabbix-mysql:
        condition: service_healthy      # Wait for MySQL to be ready

  # ─────────────────────────────────────────────
  # 3. Zabbix Web (Nginx frontend)
  # ─────────────────────────────────────────────
  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-latest
    container_name: zabbix-web
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server    # FIX: was missing in original
      DB_SERVER_HOST: zabbix-mysql
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbixpass
      PHP_TZ: Asia/Kolkata              # Set your timezone
    ports:
      - "8080:8080"                     # Access at http://localhost:8080
    networks:
      - zabbix-net
    depends_on:
      - zabbix-server

  # ─────────────────────────────────────────────
  # 4. Zabbix Agent 2 (monitors the Docker host)
  # ─────────────────────────────────────────────
  # NOTE: Using Agent2 (Go-based) — recommended over legacy Agent v1.
  # This monitors the host running Docker itself.
  # The hostname "Zabbix-Docker-Host" must match exactly what you
  # enter in the Zabbix dashboard under Configuration → Hosts.
  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-latest
    container_name: zabbix-agent2
    restart: unless-stopped
    privileged: true                    # Needed to access host metrics
    environment:
      ZBX_HOSTNAME: Zabbix-Docker-Host # Must match hostname in dashboard
      ZBX_SERVER_HOST: zabbix-server   # FIX: use service name, NOT 127.0.0.1
      ZBX_SERVER_ACTIVE: zabbix-server # For active checks
    ports:
      - "10050:10050"                   # Passive check port
    volumes:
      - /:/rootfs:ro                   # Host filesystem (read-only)
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /dev:/dev:ro
    networks:
      - zabbix-net
    depends_on:
      - zabbix-server

# ─────────────────────────────────────────────
# Named Volumes (data persists across restarts)
# ─────────────────────────────────────────────
volumes:
  zabbix-mysql-data:
  zabbix-server-data:

# ─────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────
networks:
  zabbix-net:
    driver: bridge

