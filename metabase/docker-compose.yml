services:

  # Metabase's own app database (stores dashboards, users, questions)
  metabase-db:
    image: postgres:16
    container_name: metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabasepass
    volumes:
      - metabase-db-data:/var/lib/postgresql/data
    networks:
      - metabase-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"        # Access at http://localhost:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_HOST: metabase-db   # service name, not localhost
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabasepass
      JAVA_TIMEZONE: Asia/Kolkata
    volumes:
      - metabase-data:/metabase-data
    networks:
      - metabase-net
    depends_on:
      metabase-db:
        condition: service_healthy

volumes:
  metabase-db-data:
  metabase-data:

networks:
  metabase-net:
    driver: bridge